[keyboard]
comma=["switch", "s_left_flipper"]
period=["switch", "s_right_flipper"]
1=["switch", "s_scoop"]
2=["switch", "s_vuk"]
8=["switch", "s_frontbumper"]
9=["switch", "s_backbumper"]
s=["switch", "s_start"]
space=["switch", "s_launch"]
p=["switch", "s_plunger"]

[sound_system]
music={
"type": "solo"
}
effects={
"default": true,
"simultaneous_sounds": 3,
"type": "simultaneous"
}
voice={
"type": "sequential"
}

[mpf]
virtual=true
verbose=false

[gmc]
fullscreen=false
exit_on_esc=true
logging_global=1
logging_server=0
logging_game=0
logging_media=0
logging_process=0
logging_sound_player=0
